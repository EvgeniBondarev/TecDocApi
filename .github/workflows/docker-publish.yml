name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # Запуск только при пуше в main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Логинимся в Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Сборка и пуш Docker образа с двумя тегами
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            bondarevevgeni/studio2:latest
            bondarevevgeni/studio2:${{ github.sha }}

      # 4. Опционально: вывести список образов
      - name: List pushed images
        run: docker images
