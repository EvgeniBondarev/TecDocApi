services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.8
    container_name: tecdoc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - tecdoc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.18.8
    container_name: tecdoc-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - tecdoc-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tecdoc-api
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8082
      # Строка подключения к БД берется из .env файла (TECDOC_DATABASE_CONNECTION_STRING)
      # Или из appsettings.Development.json для локальной разработки
      - Elasticsearch__Url=http://elasticsearch:9200
      - Elasticsearch__IndexName=articles
      - Elasticsearch__SupplierIndexName=suppliers
      - Elasticsearch__BulkSize=1000
      - Elasticsearch__SupplierBulkSize=500
      - Elasticsearch__SyncIntervalMinutes=5
      - Elasticsearch__SupplierSyncIntervalMinutes=10
      # Настройки S3 для изображений
      - S3__AccessKey=${S3_ACCESS_KEY}
      - S3__SecretKey=${S3_SECRET_KEY}
      - S3__EndpointUrl=${S3_ENDPOINT_URL:-https://s3.timeweb.cloud}
      - S3__RegionName=${S3_REGION_NAME:-ru-1}
      - S3__BucketName=${S3_BUCKET_NAME}
      - S3__BasePath=TD2018/images
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tecdoc-network
    # Примечание: База данных MySQL должна быть доступна извне
    # Строка подключения настраивается в .env файле или appsettings.Development.json
    # Этот файл используется для локальной разработки с локальной сборкой образа
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/swagger/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  elasticsearch-data:

networks:
  tecdoc-network:
    driver: bridge

